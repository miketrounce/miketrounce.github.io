<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="refresh" content="0; url=../" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting to Michael Trounce</title>
    <link rel="canonical" href="https://miketrounce.github.io/Personal-Projects/" />
    <style>
      :root {
        color-scheme: light;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        background: #f2ede4;
        color: #201a16;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top left, rgba(154, 77, 47, 0.14), transparent 28%),
          linear-gradient(180deg, #f2ede4 0%, #e7decd 100%);
      }

      main {
        width: min(100%, 620px);
        padding: 32px;
        border: 1px solid #d7c8b2;
        border-radius: 24px;
        background: rgba(255, 250, 242, 0.9);
        box-shadow: 0 16px 40px rgba(49, 34, 20, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(2rem, 5vw, 3.2rem);
      }

      p {
        margin: 0 0 16px;
        line-height: 1.6;
        color: #6d6459;
      }

      a {
        color: #9a4d2f;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Redirecting to the home page.</h1>
      <p>
        The portfolio content now lives at the root of this site so the main
        public entry point works as the landing page.
      </p>
      <p>
        If you are not redirected automatically, open
        <a href="../">miketrounce.github.io/Personal-Projects/</a>.
      </p>
    </main>
  </body>
</html>
