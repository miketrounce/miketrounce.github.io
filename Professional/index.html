<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Michael Trounce | Professional</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        --panel: #34312d;
        --border: #45403a;
        --muted: #b8b0a4;
        --text: #f4f2ec;
        --accent: #d6aa58;
        --accent-dark: #b88733;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(214, 170, 88, 0.08), transparent 24%),
          linear-gradient(180deg, #322f2c 0%, #2b2926 100%);
        color: var(--text);
      }

      main {
        width: min(100%, 960px);
        margin: 0 auto;
        padding: 40px 22px 60px;
      }

      .hero {
        border: 1px solid var(--border);
        border-radius: 24px;
        background: linear-gradient(180deg, #3b3833 0%, #2f2c28 100%);
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
        padding: 36px;
        text-align: center;
      }

      .eyebrow {
        text-transform: uppercase;
        letter-spacing: 0.14em;
        font-size: 0.75rem;
        color: var(--accent);
        margin: 0 0 12px;
      }

      h1 {
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(2.4rem, 6vw, 3.6rem);
        font-weight: 900;
        margin: 0 0 8px;
        line-height: 1;
      }

      p {
        color: var(--muted);
        line-height: 1.6;
        margin-top: 0;
      }

      .subtitle {
        font-size: 1.1rem;
        margin-bottom: 32px;
      }

      .video-container {
        width: 100%;
        aspect-ratio: 16/9;
        border-radius: 16px;
        border: 1px solid var(--border);
        background: linear-gradient(135deg, #2a2520 0%, #1e1b18 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: border-color 0.2s;
        position: relative;
        overflow: hidden;
      }

      .video-container:hover {
        border-color: var(--accent);
      }

      .play-btn {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: linear-gradient(180deg, var(--accent) 0%, var(--accent-dark) 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 16px;
        box-shadow: 0 8px 24px rgba(214, 170, 88, 0.2);
        transition: transform 0.15s;
      }

      .video-container:hover .play-btn {
        transform: scale(1.08);
      }

      .play-btn svg {
        width: 32px;
        height: 32px;
        margin-left: 4px;
      }

      .video-label {
        color: var(--muted);
        font-size: 0.9rem;
        letter-spacing: 0.04em;
      }

      .nav-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: center;
        margin-top: 28px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        padding: 11px 18px;
        text-decoration: none;
        font-weight: 700;
        font-size: 0.95rem;
      }

      a.primary {
        background: linear-gradient(180deg, var(--accent) 0%, var(--accent-dark) 100%);
        color: #24180a;
      }

      a.secondary {
        color: var(--text);
        border: 1px solid var(--border);
        background: transparent;
      }

      .contact {
        margin-top: 20px;
        padding: 20px;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: linear-gradient(180deg, #3b3833 0%, #2f2c28 100%);
        display: flex;
        flex-wrap: wrap;
        gap: 24px;
        justify-content: center;
        font-size: 0.9rem;
        color: var(--muted);
      }

      .contact span {
        white-space: nowrap;
      }

      .contact a {
        display: inline;
        padding: 0;
        border: none;
        border-radius: 0;
        background: transparent;
        color: var(--accent);
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <p class="eyebrow">Professional</p>
        <h1>Michael Trounce</h1>
        <p class="subtitle">Builder of EM and Global Macro products, looking for my next role.</p>

        <div class="video-container" id="videoTrigger">
          <div class="play-btn">
            <svg viewBox="0 0 24 24" fill="#24180a" xmlns="http://www.w3.org/2000/svg">
              <polygon points="6,3 20,12 6,21"/>
            </svg>
          </div>
          <span class="video-label">Watch the explainer video</span>
        </div>

        <div class="nav-actions">
          <a class="primary" href="mailto:trounceflow@gmail.com">Get in touch</a>
          <a class="secondary" href="../">Back home</a>
          <a class="secondary" href="../Knowledge-Machines/">Knowledge Machines</a>
          <a class="secondary" href="../Tricksy/">Tricksy</a>
        </div>
      </section>

      <div class="contact">
        <span>trounceflow@gmail.com</span>
        <span>+44 7887 546080</span>
        <span><a href="https://www.linkedin.com/in/michael-trounce/">LinkedIn</a></span>
        <span><a href="https://github.com/miketrounce">GitHub</a></span>
        <span>London, UK</span>
      </div>
    </main>
  </body>
</html>
